services:
  openspeedtest:
    image: openspeedtest/latest:latest
    container_name: openspeedtest
    restart: unless-stopped
    environment:
      CHANGE_CONTAINER_PORTS: "True"
      HTTP_PORT: "80"
      HTTPS_PORT: "443"
    ulimits:
      nofile:
        soft: 2048
        hard: 524288
    networks:
      macvlan:
        ipv4_address: 192.168.1.5
networks:
  macvlan:
    external: true
